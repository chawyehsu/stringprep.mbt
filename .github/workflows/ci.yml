name: CI
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '.vscode'
      - '*.md'
  push:
    branches:
      - main
jobs:
  ci_check:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Moonup
        uses: chawyehsu/setup-moonup@8b0340aa45016c02c776cbe42a7856b371e610bf # v1.0.0

      - name: Check Version
        run: moon version --all

      - name: Run Tests
        run: moon test --target all -v

      - name: Run Test (Native)
        run: moon test --target native -v

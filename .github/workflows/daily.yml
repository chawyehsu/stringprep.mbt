name: CI (Nightly)
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * *"
jobs:
  ci_check:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove pinned version
        run: rm -f moonbit-version

      - name: Setup Moonup
        uses: chawyehsu/setup-moonup@8b0340aa45016c02c776cbe42a7856b371e610bf # v1.0.0
        with:
          moonbit-version: nightly

      - name: Set Default Toolchain
        run: moonup default nightly

      - name: Check Version
        run: moon version --all

      - name: Run Tests
        run: moon test --target all -v
